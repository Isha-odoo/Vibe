<!DOCTYPE html>
<html>
<head>
  <title>OurChat</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; background:#f3f4f6; }
    .box { max-width:400px; margin:50px auto; background:white; padding:20px; border-radius:10px; }
    input, button { width:100%; padding:10px; margin:8px 0; }
    button { background:#333; color:white; border:none; cursor:pointer; }
    #chat { display:none; }
  </style>
</head>

<body>

<div class="box" id="loginBox">
  <h3>Login</h3>
  <input id="name" placeholder="Your name">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Enter</button>
  <p id="error" style="color:red;"></p>
</div>

<div class="box" id="chat">
  <h3>Chat Room</h3>
  <div id="messages"></div>
  <input id="msg" placeholder="Message">
  <button id="sendBtn">Send</button>
</div>

<script>
const PASSWORD = "loveyou";
let currentUser = "";

// ✅ attach event AFTER page loads
document.getElementById("loginBtn").addEventListener("click", function() {
  console.log("CLICK WORKING");

  const name = document.getElementById("name").value;
  const pass = document.getElementById("pass").value;

  if (!name) {
    document.getElementById("error").innerText = "Enter name";
    return;
  }

  if (pass.trim().toLowerCase() !== PASSWORD) {
    document.getElementById("error").innerText = "Wrong password";
    return;
  }

  currentUser = name;

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("chat").style.display = "block";
});

// SEND BUTTON TEST
document.getElementById("sendBtn").addEventListener("click", function() {
  alert("Send clicked ✅");
});
</script>

</body>
</html>
