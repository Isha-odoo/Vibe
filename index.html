<!DOCTYPE html>
<html>
<head>
  <title>Our Chat 💞</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f3f4f6;
    }

    .container {
      max-width: 520px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4b5563;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .chat {
      height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .msg {
      padding: 10px;
      border-radius: 12px;
      max-width: 70%;
    }

    .me {
      background: #e5e7eb;
      align-self: flex-end;
    }

    .other {
      background: #ffffff;
      align-self: flex-start;
    }

    .time {
      font-size: 10px;
      opacity: 0.6;
      text-align: right;
    }

    #error {
      color: red;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login" class="card">
    <h2>💬Let's Talk</h2>

    <input id="name" placeholder="Your name">
    <input id="pass" type="password" placeholder="Password">

    <button type="button" onclick="login()">Enter</button>

    <p id="error"></p>
  </div>

  <!-- CHAT -->
  <div id="chatUI" class="card" style="display:none;">
    <h3>💞 Your Space</h3>

    <div id="chat" class="chat"></div>

    <input id="msg" placeholder="Type message..." />
    <button type="button" onclick="send()">Send</button>
  </div>

</div>

<script>
const SUPABASE_URL = "https://styskdmjtfbbbrjjkfxe.supabase.co";
const SUPABASE_KEY = "sb_publishable_1IvvlwE_CVoFzV8R6LkSnA_nATdDE7l";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PASSWORD = "loveyou";
const COUPLE_ID = "Yours";

let currentUser = "";

// LOGIN
function login() {
  const name = document.getElementById("name").value;
  const pass = document.getElementById("pass").value;

  if (!name) {
    document.getElementById("error").innerText = "Enter name";
    return;
  }

  if (pass.trim().toLowerCase() !== PASSWORD) {
    document.getElementById("error").innerText = "Wrong password";
    return;
  }

  currentUser = name;

  document.getElementById("login").style.display = "none";
  document.getElementById("chatUI").style.display = "block";

  loadMessages();
  listenRealtime();
}

// LOAD MESSAGES
async function loadMessages() {
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .eq("couple_id", COUPLE_ID)
    .order("created_at");

  if (error) {
    console.error(error);
    return;
  }

  document.getElementById("chat").innerHTML = "";
  data.forEach(addMessage);
}

// ADD MESSAGE
function addMessage(m) {
  const div = document.createElement("div");

  const isMe = m.sender === currentUser;
  div.className = "msg " + (isMe ? "me" : "other");

  const time = new Date(m.created_at).toLocaleTimeString([], {
    hour: "2-digit",
    minute: "2-digit"
  });

  div.innerHTML = `
    <b>${m.sender}</b><br>
    ${m.message}
    <div class="time">${time}</div>
  `;

  document.getElementById("chat").appendChild(div);
  div.scrollIntoView();
}

// SEND MESSAGE
async function send() {
  const msg = document.getElementById("msg").value;

  if (!msg) return;

  const { error } = await supabase.from("messages").insert({
    couple_id: COUPLE_ID,
    sender: currentUser,
    message: msg
  });

  if (error) {
    console.error(error);
  }

  document.getElementById("msg").value = "";
}

// REALTIME LISTENER
function listenRealtime() {
  supabase.channel("chat")
    .on("postgres_changes", {
      event: "INSERT",
      schema: "public",
      table: "messages"
    }, payload => {
      addMessage(payload.new);
    })
    .subscribe();
}
</script>

</body>
</html>
