<!DOCTYPE html>
<html>
<head>
  <title>Premium Chat</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-container {
      width: 420px;
      height: 600px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
    }

    .header {
      background: linear-gradient(90deg, #ff4b6e, #ff8a5c);
      padding: 15px;
      color: white;
      text-align: center;
      font-weight: bold;
      font-size: 18px;
    }

    #messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f7f7f7;
    }

    .msg {
      padding: 10px 12px;
      margin: 8px 0;
      border-radius: 15px;
      max-width: 75%;
      font-size: 14px;
      word-wrap: break-word;
    }

    .me {
      background: #ff4b6e;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }

    .other {
      background: #e0e0e0;
      margin-right: auto;
      border-bottom-left-radius: 5px;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 20px;
      background: #f1f1f1;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 20px;
      background: #ff4b6e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #e63e60;
    }
  </style>
</head>

<body>

<div class="chat-container">
  <div class="header">💕 Couple Chat Room</div>

  <div id="messages"></div>

  <div class="input-box">
    <input type="text" id="email" placeholder="Your name">
    <input type="text" id="message" placeholder="Type message">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const SUPABASE_URL = "https://styskdmjtfbbbrjjkfxe.supabase.co";
const SUPABASE_KEY = "YOUR_ANON_KEY";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// SEND MESSAGE
async function sendMessage() {
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  if (!email || !message) return;

  await supabaseClient.from("messages").insert([{ email, message }]);

  document.getElementById("message").value = "";
  loadMessages();
}

// LOAD MESSAGES
async function loadMessages() {
  let { data } = await supabaseClient
    .from("messages")
    .select("*")
    .order("id", { ascending: true });

  const box = document.getElementById("messages");
  box.innerHTML = "";

  data.forEach(msg => {
    const isMe = msg.email === document.getElementById("email").value;

    box.innerHTML += `
      <div class="msg ${isMe ? 'me' : 'other'}">
        <b>${msg.email}</b><br>${msg.message}
      </div>
    `;
  });

  box.scrollTop = box.scrollHeight;
}

loadMessages();
setInterval(loadMessages, 2000);
</script>

</body>
</html>
